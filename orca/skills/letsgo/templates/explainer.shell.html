<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="<!-- SLOT:meta_description -->">
  <title><!-- SLOT:title --></title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap">
  <style>
    :root {
      /* Canvas & surfaces (Revolut dark) */
      --canvas: #000000;
      --surface-deep: #0a0a0a;
      --surface-elevated: #16181a;
      --surface-featured: #494fdf;
      /* Lines */
      --hairline: rgba(255, 255, 255, 0.12);
      --divider-soft: rgba(255, 255, 255, 0.06);
      --hairline-strong: #191c1f;
      /* Text on dark */
      --on-dark: #ffffff;
      --on-dark-mute: rgba(255, 255, 255, 0.72);
      --stone: #8d969e;
      --faint: #c9c9cd;
      /* Brand accent — cobalt violet (reserved) */
      --primary: #494fdf;
      --primary-bright: #4f55f1;
      --primary-deep: #3a40c4;
      --on-primary: #ffffff;
      /* Data / illustration accents */
      --teal: #00a87e;
      --danger: #e23b4a;
      --warning: #ec7e00;
      --link: #4f55f1;
      /* Fonts */
      --display: "Aeonik Pro", "Inter Display", "General Sans", Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: ui-monospace, "SF Mono", "SFMono-Regular", Menlo, Consolas, "Liberation Mono", monospace;
      /* Radius (Revolut scale) */
      --r-sm: 8px;
      --r-md: 12px;
      --r-lg: 20px;
      --r-xl: 28px;
      --r-full: 9999px;
      /* Layout */
      --page: 1200px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      scroll-padding-top: 88px;
    }

    body {
      margin: 0;
      background: var(--canvas);
      color: var(--on-dark-mute);
      font-family: var(--sans);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
      letter-spacing: 0.24px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    ::selection {
      background: var(--primary);
      color: var(--on-primary);
    }

    a {
      color: var(--link);
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    a:hover {
      color: var(--on-dark);
    }

    a:focus-visible,
    summary:focus-visible,
    .back-to-top:focus-visible {
      outline: 2px solid var(--primary-bright);
      outline-offset: 2px;
      border-radius: var(--r-sm);
    }

    main:focus {
      outline: none;
    }

    button,
    summary {
      font: inherit;
    }

    code,
    pre,
    kbd,
    .mono,
    .cm-item {
      font-family: var(--mono);
      letter-spacing: 0;
    }

    code {
      padding: 0.1rem 0.36rem;
      border: 1px solid var(--hairline);
      border-radius: var(--r-sm);
      background: var(--surface-elevated);
      color: var(--on-dark);
      font-size: 0.85em;
      overflow-wrap: anywhere;
    }

    pre {
      margin: 0;
      overflow: auto;
      padding: 24px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-md);
      background: var(--surface-deep);
      color: var(--on-dark-mute);
      font-size: 13px;
      line-height: 1.5;
      tab-size: 2;
    }

    pre code {
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
    }

    h1,
    h2,
    h3,
    h4 {
      margin: 0;
      color: var(--on-dark);
      font-family: var(--display);
      font-weight: 500;
      letter-spacing: -0.01em;
      text-wrap: balance;
    }

    /* Revolut display scale — display-xl/lg, line-height ~1.0, tight tracking */
    h1 {
      max-width: 20ch;
      font-size: clamp(38px, 6.4vw, 72px);
      line-height: 1.03;
      letter-spacing: -0.022em;
    }

    h2 {
      font-size: clamp(30px, 3.6vw, 48px);
      line-height: 1.08;
      letter-spacing: -0.014em;
    }

    h3 {
      font-size: 22px;
      line-height: 1.32;
      letter-spacing: -0.008em;
    }

    h4 {
      font-size: 18px;
      line-height: 1.4;
      letter-spacing: -0.006em;
    }

    p {
      margin: 0;
    }

    strong {
      color: var(--on-dark);
      font-weight: 600;
    }

    /* Inter labels — positive tracking, sentence case */
    .eyebrow,
    .metric-label,
    .section-num,
    .card-kicker,
    .quiz-note,
    th {
      font-family: var(--sans);
    }

    .skip-link {
      position: fixed;
      z-index: 100;
      top: 8px;
      left: 8px;
      transform: translateY(-160%);
      padding: 10px 16px;
      border-radius: var(--r-full);
      background: var(--on-dark);
      color: #000000;
      font-weight: 600;
      letter-spacing: 0.24px;
      text-decoration: none;
    }

    .skip-link:focus {
      transform: translateY(0);
    }

    /* Top navigation (nav-bar: black, 64px) */
    .topbar {
      position: sticky;
      z-index: 50;
      top: 0;
      border-bottom: 1px solid var(--hairline);
      background: rgba(0, 0, 0, 0.72);
      backdrop-filter: blur(18px);
    }

    .nav {
      display: flex;
      width: min(100% - 48px, var(--page));
      height: 64px;
      margin: 0 auto;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--on-dark);
      text-decoration: none;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .brand-mark {
      width: 0;
      height: 0;
      border-right: 9px solid transparent;
      border-bottom: 16px solid var(--primary);
      border-left: 9px solid transparent;
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 2px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .nav-links::-webkit-scrollbar {
      display: none;
    }

    .nav-links a {
      padding: 8px 14px;
      border-radius: var(--r-full);
      color: var(--on-dark-mute);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      background: var(--surface-elevated);
      color: var(--on-dark);
    }

    main {
      overflow: hidden;
    }

    .container {
      width: min(100% - 48px, var(--page));
      margin: 0 auto;
    }

    /* Hero — full-bleed dark band, commit summary header */
    .hero {
      position: relative;
      border-bottom: 1px solid var(--hairline);
      background: var(--canvas);
    }

    .hero-inner {
      padding: 108px 0 80px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      margin-bottom: 28px;
      padding: 6px 14px;
      border-radius: var(--r-full);
      background: var(--primary);
      color: var(--on-primary);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.24px;
    }

    .eyebrow-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--on-primary);
    }

    .hero-lead {
      max-width: 680px;
      margin-top: 24px;
      color: var(--on-dark-mute);
      font-size: 18px;
      line-height: 1.56;
      letter-spacing: -0.09px;
    }

    /* Signature: commit / PR change-summary card (featured accent) */
    .commit-summary {
      position: relative;
      max-width: 680px;
      margin-top: 40px;
      padding: 22px 24px 24px;
      border: 1px solid rgba(73, 79, 223, 0.55);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
    }

    .commit-summary::before {
      content: "";
      position: absolute;
      top: 22px;
      bottom: 24px;
      left: 0;
      width: 3px;
      border-radius: var(--r-full);
      background: var(--primary);
    }

    .commit-meta {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 22px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .cm-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--on-dark-mute);
      font-size: 12px;
      line-height: 1.4;
    }

    .cm-item svg {
      width: 15px;
      height: 15px;
      flex: none;
      color: var(--stone);
      stroke: currentColor;
      stroke-width: 1.6;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cm-item.check svg {
      color: var(--teal);
    }

    .diffbar {
      display: flex;
      gap: 2px;
      height: 6px;
      margin-top: 18px;
      border-radius: var(--r-full);
      background: rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }

    .diffbar .add {
      background: var(--teal);
    }

    .diffbar .del {
      min-width: 4px;
      background: var(--danger);
    }

    /* Sections — magazine rhythm via surface luminance */
    .section {
      padding: 88px 0;
      border-bottom: 1px solid var(--hairline);
      background: var(--canvas);
    }

    .section.white {
      background: var(--surface-deep);
    }

    .section.dark {
      background: var(--canvas);
    }

    .section-head {
      display: grid;
      grid-template-columns: minmax(0, 0.3fr) minmax(0, 1fr);
      gap: 32px;
      margin-bottom: 48px;
    }

    .section-num {
      padding-top: 8px;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.24px;
    }

    .section-copy {
      max-width: 720px;
    }

    .section-intro {
      margin-top: 18px;
      color: var(--on-dark-mute);
      font-size: 18px;
      line-height: 1.56;
      letter-spacing: -0.09px;
    }

    .section-body {
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* Metrics — bordered grid, no shadow */
    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
      overflow: hidden;
    }

    .metric {
      min-height: 152px;
      padding: 28px;
      border-right: 1px solid var(--hairline);
    }

    .metric:last-child {
      border-right: 0;
    }

    .metric-value {
      color: var(--on-dark);
      font-family: var(--display);
      font-size: 44px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.4px;
    }

    .metric-label {
      margin-top: 18px;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.24px;
    }

    .metric-note {
      margin-top: 6px;
      color: var(--on-dark-mute);
      font-size: 14px;
      line-height: 1.43;
    }

    /* Card grids */
    .duo,
    .trio,
    .gap-grid {
      display: grid;
      gap: 24px;
    }

    .duo {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .trio {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }

    .gap-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      padding: 28px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
      color: var(--on-dark-mute);
    }

    .card.large {
      padding: 32px;
    }

    .card-kicker {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.4;
      letter-spacing: 0.24px;
    }

    .card-index {
      display: inline-grid;
      width: 28px;
      height: 28px;
      place-items: center;
      border: 1px solid var(--hairline);
      border-radius: var(--r-full);
      background: var(--surface-deep);
      color: var(--on-dark);
      font-family: var(--mono);
    }

    .card p,
    .card li {
      font-size: 15px;
      line-height: 1.6;
    }

    .card h3 + p,
    .card h4 + p {
      margin-top: 12px;
    }

    .card ul,
    .card ol {
      margin: 18px 0 0;
      padding-left: 20px;
    }

    .card li + li {
      margin-top: 8px;
    }

    /* Contract row */
    .contract {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--hairline);
      overflow: hidden;
    }

    .contract-item {
      min-height: 112px;
      padding: 22px;
      background: var(--surface-elevated);
    }

    .contract-item .mono {
      color: var(--on-dark);
      font-size: 13px;
      line-height: 1.5;
    }

    .contract-item p {
      margin-top: 10px;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.5;
    }

    /* Priority path */
    .path {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      align-items: stretch;
      gap: 36px;
    }

    .path-step {
      position: relative;
      min-height: 168px;
      padding: 26px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
    }

    .path-step:not(:last-child)::after {
      position: absolute;
      top: 50%;
      right: -27px;
      color: var(--stone);
      content: "→";
      font-family: var(--mono);
      font-size: 18px;
    }

    .path-step .mono {
      color: var(--on-dark);
      font-size: 12px;
    }

    .path-step h3 {
      margin-top: 18px;
    }

    .path-step p {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Flow timeline */
    .flow {
      position: relative;
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: flow;
    }

    .flow::before {
      position: absolute;
      top: 18px;
      bottom: 18px;
      left: 19px;
      width: 1px;
      background: var(--hairline);
      content: "";
    }

    .flow-item {
      position: relative;
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr);
      gap: 24px;
      counter-increment: flow;
    }

    .flow-item + .flow-item {
      margin-top: 24px;
    }

    .flow-marker {
      z-index: 1;
      display: grid;
      width: 40px;
      height: 40px;
      place-items: center;
      border: 1px solid var(--hairline);
      border-radius: var(--r-full);
      background: var(--surface-elevated);
      color: var(--on-dark);
      font-family: var(--mono);
      font-size: 12px;
    }

    .flow-marker::before {
      content: counter(flow, decimal-leading-zero);
    }

    .flow-panel {
      padding: 26px 28px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
    }

    .flow-panel p,
    .flow-panel li {
      font-size: 15px;
      line-height: 1.6;
    }

    .flow-panel h3 + p,
    .flow-panel h3 + ul,
    .flow-panel h3 + pre {
      margin-top: 12px;
    }

    .flow-panel ul {
      margin: 12px 0 0;
      padding-left: 20px;
    }

    .flow-panel li + li {
      margin-top: 6px;
    }

    .state-wrap {
      padding: 8px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-deep);
    }

    /* Callout */
    .callout {
      padding: 24px;
      border: 1px solid var(--hairline);
      border-left: 3px solid var(--on-dark-mute);
      border-radius: 0 var(--r-md) var(--r-md) 0;
      background: var(--surface-elevated);
    }

    .callout p + p {
      margin-top: 10px;
    }

    .callout.warn {
      border-left-color: var(--warning);
    }

    /* Tables */
    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
    }

    th,
    td {
      padding: 18px 22px;
      border-bottom: 1px solid var(--hairline);
      vertical-align: top;
    }

    th {
      background: var(--surface-deep);
      color: var(--stone);
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      letter-spacing: 0.24px;
    }

    td {
      color: var(--on-dark-mute);
      font-size: 14px;
      line-height: 1.55;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    td:first-child {
      color: var(--on-dark);
      font-weight: 600;
    }

    /* Decisions — featured rationale, violet accent */
    .decisions {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .decisions li {
      display: grid;
      grid-template-columns: minmax(190px, 0.85fr) 24px minmax(0, 1.25fr);
      gap: 16px;
      padding: 20px 22px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
      font-size: 14px;
      line-height: 1.55;
    }

    .decisions .choice {
      color: var(--on-dark);
    }

    .decisions .why {
      color: var(--on-dark-mute);
    }

    .decisions .arrow {
      color: var(--stone);
      font-family: var(--mono);
      text-align: center;
    }

    /* Gaps */
    .gap-card {
      position: relative;
      padding: 28px 28px 28px 72px;
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
    }

    .gap-num {
      position: absolute;
      top: 28px;
      left: 26px;
      color: var(--stone);
      font-family: var(--mono);
      font-size: 12px;
    }

    .gap-card p {
      margin-top: 10px;
      font-size: 14px;
      line-height: 1.6;
    }

    /* Quiz */
    .quiz-note {
      margin-bottom: 24px;
      color: var(--stone);
      font-size: 14px;
      letter-spacing: 0.24px;
    }

    .quiz {
      display: grid;
      gap: 16px;
    }

    .quiz-item {
      border: 1px solid var(--hairline);
      border-radius: var(--r-lg);
      background: var(--surface-elevated);
      overflow: hidden;
    }

    .quiz-item summary {
      display: grid;
      grid-template-columns: 40px minmax(0, 1fr) 28px;
      gap: 16px;
      align-items: start;
      padding: 24px;
      color: var(--on-dark);
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      line-height: 1.5;
      list-style: none;
    }

    .quiz-item summary::-webkit-details-marker {
      display: none;
    }

    .quiz-id {
      color: var(--stone);
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 400;
      line-height: 24px;
    }

    .quiz-toggle {
      display: grid;
      width: 24px;
      height: 24px;
      place-items: center;
      border: 1px solid var(--hairline);
      border-radius: var(--r-full);
      color: var(--stone);
      font-family: var(--mono);
      font-size: 15px;
      transition: transform 160ms ease;
    }

    .quiz-item[open] .quiz-toggle {
      transform: rotate(45deg);
    }

    .quiz-answer {
      padding: 0 68px 28px 80px;
      color: var(--on-dark-mute);
      font-size: 15px;
      line-height: 1.7;
    }

    /* Footer */
    footer {
      padding: 80px 0;
      background: var(--canvas);
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
    }

    .footer-title {
      color: var(--on-dark);
      font-size: 15px;
      font-weight: 600;
    }

    .footer-copy {
      max-width: 720px;
      margin-top: 10px;
      color: var(--stone);
      font-size: 13px;
      line-height: 1.6;
    }

    .back-to-top {
      display: inline-flex;
      min-height: 48px;
      align-items: center;
      padding: 12px 24px;
      border: 1px solid var(--on-dark-mute);
      border-radius: var(--r-full);
      background: transparent;
      color: var(--on-dark);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.24px;
      text-decoration: none;
    }

    .back-to-top:hover {
      background: var(--surface-elevated);
      color: var(--on-dark);
    }

    @media (max-width: 960px) {
      .nav {
        width: min(100% - 32px, var(--page));
      }

      .nav-links a:nth-child(n + 5) {
        display: none;
      }

      .container {
        width: min(100% - 32px, var(--page));
      }

      .metrics,
      .trio {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .metric:nth-child(2) {
        border-right: 0;
      }

      .metric:nth-child(-n + 2) {
        border-bottom: 1px solid var(--hairline);
      }

      .contract {
        grid-template-columns: 1fr;
      }

      .path {
        grid-template-columns: 1fr;
        gap: 20px;
      }

      .path-step:not(:last-child)::after {
        top: auto;
        right: 50%;
        bottom: -19px;
        transform: rotate(90deg);
      }

      .decisions li {
        grid-template-columns: 1fr;
        gap: 8px;
      }

      .decisions .arrow {
        text-align: left;
        transform: rotate(90deg);
        transform-origin: center;
      }
    }

    @media (max-width: 680px) {
      html {
        scroll-padding-top: 72px;
      }

      .nav {
        height: 56px;
      }

      .nav-links a {
        display: none;
      }

      .nav-links a:last-child {
        display: inline-flex;
      }

      .hero-inner {
        padding: 72px 0 56px;
      }

      .hero-lead {
        font-size: 16px;
        line-height: 1.5;
      }

      .commit-summary {
        padding: 18px 18px 20px;
      }

      .section {
        padding: 64px 0;
      }

      .section-head,
      .duo,
      .metrics,
      .trio,
      .gap-grid {
        grid-template-columns: 1fr;
      }

      .section-head {
        gap: 12px;
        margin-bottom: 32px;
      }

      .section-num {
        padding-top: 0;
      }

      .metric {
        min-height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--hairline);
      }

      .metric:nth-child(3) {
        border-bottom: 1px solid var(--hairline);
      }

      .metric:last-child {
        border-bottom: 0;
      }

      .card,
      .card.large {
        padding: 24px;
      }

      .flow-item {
        grid-template-columns: 32px minmax(0, 1fr);
        gap: 12px;
      }

      .flow::before {
        left: 15px;
      }

      .flow-marker {
        width: 32px;
        height: 32px;
      }

      .flow-panel {
        padding: 22px;
      }

      .quiz-item summary {
        grid-template-columns: 32px minmax(0, 1fr) 24px;
        gap: 10px;
        padding: 20px;
      }

      .quiz-answer {
        padding: 0 54px 24px 62px;
      }

      .footer-grid {
        grid-template-columns: 1fr;
        align-items: start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .quiz-toggle {
        transition: none;
      }
    }
  </style>
</head>
