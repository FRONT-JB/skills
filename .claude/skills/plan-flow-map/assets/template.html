<title>__TITLE__</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/fonts-archive/Paperlogy/Paperlogy.css');
  :root {
    color-scheme: light dark;
    --bg: #0d1015; --panel: #141922; --panel-2: #101520; --card: #1a212d; --card-hi: #212a39;
    --line: #263041; --line-soft: #1d2531; --ink: #d6deea; --ink-strong: #f2f6fc; --muted: #7b8698; --muted-2: #5c6577;
    --gold: #ffcf4d; --gold-soft: rgba(255,207,77,0.13); --gold-line: rgba(255,207,77,0.7);
    --warn: #e2765d; --warn-soft: rgba(226,118,93,0.12); --warn-line: rgba(226,118,93,0.6);
    --info: #57a6ea; --info-soft: rgba(87,166,234,0.12); --info-line: rgba(87,166,234,0.55);
    --ok: #63c06a; --ok-soft: rgba(99,192,106,0.12);
    /* http method + categorical accents */
    --m-get: #63c06a; --m-post: #57a6ea; --m-patch: #e6a44f; --m-put: #a98be2; --m-delete: #e2765d; --m-other: #8f9bb3;
    --shadow: 0 1px 0 rgba(255,255,255,0.03), 0 10px 30px -18px rgba(0,0,0,0.8);
    --mono: 'Paperlogy', ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", "Consolas", monospace;
    --sans: 'Paperlogy', -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", "Pretendard", system-ui, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f0eee6; --panel: #f7f5ef; --panel-2: #efece3; --card: #faf9f5; --card-hi: #f7efe9;
      --line: #e3ddce; --line-soft: #ece7db; --ink: #3a3833; --ink-strong: #33302b; --muted: #77726a; --muted-2: #a8a294;
      --gold: #b06a1f; --gold-soft: rgba(176,106,31,0.1); --gold-line: rgba(176,106,31,0.5);
      --warn: #9e5233; --warn-soft: rgba(158,82,51,0.09); --warn-line: rgba(158,82,51,0.45);
      --info: #3f7fb3; --info-soft: rgba(63,127,179,0.09); --info-line: rgba(63,127,179,0.4);
      --ok: #4f7d3f; --ok-soft: rgba(79,125,63,0.1);
      --m-get: #4f7d3f; --m-post: #3f7fb3; --m-patch: #96631e; --m-put: #6f4f9e; --m-delete: #9e5233; --m-other: #6a6558;
      --shadow: 0 1px 2px rgba(20,20,19,0.05), 0 12px 30px -20px rgba(20,20,19,0.28);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0d1015; --panel: #141922; --panel-2: #101520; --card: #1a212d; --card-hi: #212a39;
    --line: #263041; --line-soft: #1d2531; --ink: #d6deea; --ink-strong: #f2f6fc; --muted: #7b8698; --muted-2: #5c6577;
    --gold: #ffcf4d; --gold-soft: rgba(255,207,77,0.13); --gold-line: rgba(255,207,77,0.7);
    --warn: #e2765d; --warn-soft: rgba(226,118,93,0.12); --warn-line: rgba(226,118,93,0.6);
    --info: #57a6ea; --info-soft: rgba(87,166,234,0.12); --info-line: rgba(87,166,234,0.55);
    --ok: #63c06a; --ok-soft: rgba(99,192,106,0.12);
    --m-get: #63c06a; --m-post: #57a6ea; --m-patch: #e6a44f; --m-put: #a98be2; --m-delete: #e2765d; --m-other: #8f9bb3;
    --shadow: 0 1px 0 rgba(255,255,255,0.03), 0 10px 30px -18px rgba(0,0,0,0.8);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f0eee6; --panel: #f7f5ef; --panel-2: #efece3; --card: #faf9f5; --card-hi: #f7efe9;
    --line: #e3ddce; --line-soft: #ece7db; --ink: #3a3833; --ink-strong: #33302b; --muted: #77726a; --muted-2: #a8a294;
    --gold: #b06a1f; --gold-soft: rgba(176,106,31,0.1); --gold-line: rgba(176,106,31,0.5);
    --warn: #9e5233; --warn-soft: rgba(158,82,51,0.09); --warn-line: rgba(158,82,51,0.45);
    --info: #3f7fb3; --info-soft: rgba(63,127,179,0.09); --info-line: rgba(63,127,179,0.4);
    --ok: #4f7d3f; --ok-soft: rgba(79,125,63,0.1);
    --m-get: #4f7d3f; --m-post: #3f7fb3; --m-patch: #96631e; --m-put: #6f4f9e; --m-delete: #9e5233; --m-other: #6a6558;
    --shadow: 0 1px 2px rgba(20,20,19,0.05), 0 12px 30px -20px rgba(20,20,19,0.28);
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--bg); color: var(--ink); font-family: var(--sans);
    font-size: 15px; line-height: 1.7; -webkit-font-smoothing: antialiased;
  }
  .theme-toggle {
    position: fixed; top: 16px; right: 16px; z-index: 50; width: 34px; height: 34px; border-radius: 9px;
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    cursor: pointer; display: grid; place-items: center; transition: color .15s, border-color .15s;
  }
  .theme-toggle:hover { color: var(--ink-strong); border-color: var(--muted); }
  .theme-toggle:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

  .doc { max-width: 880px; margin: 0 auto; padding: 56px 28px 140px; }

  /* ---------- header ---------- */
  .doc-head { margin-bottom: 4px; }
  .eyebrow {
    font-size: 11.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted-2); margin: 0 0 14px;
  }
  h1.doc-title {
    font-size: 34px; line-height: 1.18; font-weight: 700; letter-spacing: -0.02em;
    color: var(--ink-strong); margin: 0; text-wrap: balance;
  }
  .subtitle { margin: 14px 0 0; font-size: 16.5px; color: var(--muted); max-width: 66ch; line-height: 1.55; }
  .source-badge {
    display: inline-flex; align-items: center; gap: 7px; margin-top: 20px;
    font-family: var(--mono); font-size: 12px; color: var(--muted);
    border: 1px solid var(--line); border-radius: 7px; padding: 4px 10px; background: var(--card);
  }
  .source-badge svg { width: 13px; height: 13px; opacity: .8; flex: none; }
  .source-badge b { color: var(--gold); font-weight: 600; }
  .head-rule { height: 1px; background: var(--line); border: 0; margin: 30px 0 0; }

  /* ---------- generic blocks ---------- */
  h2.blk-h {
    font-size: 20px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink-strong);
    margin: 46px 0 4px; text-wrap: balance; scroll-margin-top: 20px;
    display: flex; align-items: baseline; gap: 10px;
  }
  h2.blk-h::before {
    content: ""; flex: none; width: 6px; height: 6px; border-radius: 2px;
    background: var(--gold); transform: translateY(-3px);
  }

  /* ---------- summary hero ---------- */
  .hero {
    margin-top: 24px; border: 1px solid var(--gold-line); border-radius: 14px;
    background: linear-gradient(180deg, var(--gold-soft), transparent 60%), var(--card);
    padding: 20px 22px 22px; box-shadow: var(--shadow);
  }
  .hero-h { font-size: 13px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); margin: 0 0 4px; }
  .hero > .callout:first-of-type { margin-top: 14px; }

  /* ---------- stats ---------- */
  .stats { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 10px; }
  .stat { flex: 1 1 auto; min-width: 96px; border: 1px solid var(--line); border-radius: 10px; background: var(--panel); padding: 11px 14px; }
  .stat-v { font-size: 22px; font-weight: 800; color: var(--ink-strong); letter-spacing: -0.02em; line-height: 1.1; }
  .stat-l { font-size: 11.5px; color: var(--muted); margin-top: 3px; }

  /* ---------- collapsible detail sections ---------- */
  details.section { border-top: 1px solid var(--line); scroll-margin-top: 16px; }
  details.section > summary {
    list-style: none; cursor: pointer; display: flex; align-items: center; gap: 10px;
    padding: 18px 2px; user-select: none;
  }
  details.section > summary::-webkit-details-marker { display: none; }
  details.section .sec-h { font-size: 19px; font-weight: 700; letter-spacing: -0.01em; color: var(--ink-strong); }
  details.section:not([open]) > summary:hover .sec-h { color: var(--gold); }
  .sec-chev { color: var(--muted-2); transition: transform .15s; flex: none; }
  details.section[open] > summary .sec-chev { transform: rotate(90deg); }
  .section-body { padding: 0 2px 14px; }
  .section-body > :first-child { margin-top: 6px; }

  /* ---------- table of contents ---------- */
  .toc { margin-top: 26px; border: 1px solid var(--line); border-radius: 12px; background: var(--panel); padding: 15px 18px; }
  .toc-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 9px; }
  .toc-label { font-size: 11px; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: var(--muted-2); }
  .toc-exp {
    font-family: var(--sans); font-size: 11.5px; color: var(--muted); background: var(--card);
    border: 1px solid var(--line); border-radius: 7px; padding: 3px 10px; cursor: pointer; transition: .15s;
  }
  .toc-exp:hover { color: var(--ink-strong); border-color: var(--muted); }
  .toc ol { margin: 0; padding: 0; list-style: none; columns: 2; column-gap: 28px; counter-reset: toc; }
  .toc li { margin: 5px 0; break-inside: avoid; counter-increment: toc; }
  .toc a { color: var(--ink); text-decoration: none; font-size: 13.5px; display: inline-flex; gap: 9px; align-items: baseline; }
  .toc a::before { content: counter(toc); font-family: var(--mono); font-size: 11.5px; color: var(--muted-2); }
  .toc a:hover { color: var(--gold); }
  h3.blk-h3 { font-size: 15.5px; font-weight: 700; color: var(--ink-strong); margin: 26px 0 2px; letter-spacing: 0.01em; }
  p.blk-p { margin: 12px 0 0; color: var(--ink); }
  .blk-sub { font-size: 12.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted-2); margin: 0 0 8px; }

  code {
    font-family: var(--mono); font-size: 0.86em; color: var(--ink-strong);
    background: var(--card); border: 1px solid var(--line-soft); border-radius: 5px; padding: 3px;
    word-break: break-word;
  }

  ul.blk-list, ol.blk-list { margin: 12px 0 0; padding-left: 22px; }
  ul.blk-list li, ol.blk-list li { margin: 6px 0; }
  ul.blk-list.mono { list-style: none; padding-left: 0; }
  ul.blk-list.mono li {
    font-family: var(--mono); font-size: 12.5px; color: var(--ink);
    border: 1px solid var(--line); border-radius: 7px; padding: 8px 11px; background: var(--card); margin: 7px 0;
  }

  /* ---------- callout ---------- */
  .callout {
    margin-top: 20px; border: 1px solid var(--line); border-left-width: 3px; border-radius: 10px;
    padding: 14px 16px; background: var(--card); box-shadow: var(--shadow);
  }
  .callout .ct-title { font-weight: 700; color: var(--ink-strong); margin-bottom: 5px; font-size: 14px; display: flex; align-items: center; gap: 7px; }
  .callout .ct-body { color: var(--ink); }
  .callout .ct-body p { margin: 6px 0 0; }
  .callout .ct-body p:first-child { margin-top: 0; }
  .callout.tone-gate, .callout.tone-goal { border-left-color: var(--gold-line); background: var(--gold-soft); }
  .callout.tone-gate .ct-title, .callout.tone-goal .ct-title { color: var(--gold); }
  .callout.tone-warn { border-left-color: var(--warn-line); background: var(--warn-soft); }
  .callout.tone-warn .ct-title { color: var(--warn); }
  .callout.tone-info { border-left-color: var(--info-line); background: var(--info-soft); }
  .callout.tone-info .ct-title { color: var(--info); }

  /* ---------- compare ---------- */
  .compare { margin-top: 18px; display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .cmp-card { border: 1px solid var(--line); border-radius: 11px; background: var(--card); box-shadow: var(--shadow); overflow: hidden; }
  .cmp-head { padding: 11px 14px; font-weight: 700; color: var(--ink-strong); font-size: 13.5px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .cmp-card ul { margin: 0; padding: 12px 14px 12px 30px; }
  .cmp-card li { margin: 6px 0; color: var(--ink); }
  .cmp-card.accent .cmp-head { color: var(--gold); }

  /* ---------- table ---------- */
  .table-wrap { margin-top: 18px; overflow-x: auto; border: 1px solid var(--line); border-radius: 11px; box-shadow: var(--shadow); }
  table.blk-table { border-collapse: collapse; width: 100%; font-size: 13.5px; }
  table.blk-table th, table.blk-table td { text-align: left; padding: 12px 14px; line-height: 1.7; border-bottom: 1px solid var(--line-soft); vertical-align: top; }
  table.blk-table code { background: transparent; border: 0; padding: 0; color: var(--ink-strong); word-break: break-word; }
  table.blk-table thead th { background: var(--panel); color: var(--muted-2); font-size: 11.5px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
  table.blk-table tbody tr:last-child td { border-bottom: 0; }
  table.blk-table tbody tr:hover { background: var(--card); }
  table.blk-table td:first-child { color: var(--ink-strong); font-weight: 600; }

  /* ---------- endpoint ---------- */
  details.endpoint { margin-top: 12px; border: 1px solid var(--line); border-radius: 11px; background: var(--card); box-shadow: var(--shadow); overflow: hidden; }
  details.endpoint[open] { border-color: var(--muted-2); }
  details.endpoint > summary {
    list-style: none; cursor: pointer; display: flex; align-items: center; gap: 11px; padding: 12px 15px; user-select: none;
  }
  details.endpoint > summary::-webkit-details-marker { display: none; }
  .ep-chev { color: var(--muted-2); transition: transform .15s; flex: none; }
  details.endpoint[open] .ep-chev { transform: rotate(90deg); }
  .method { font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.03em; padding: 3px 8px; border-radius: 6px; flex: none; color: #0d1015; }
  .method.get { background: var(--m-get); } .method.post { background: var(--m-post); } .method.patch { background: var(--m-patch); }
  .method.put { background: var(--m-put); } .method.delete { background: var(--m-delete); } .method.other { background: var(--m-other); }
  .ep-path { font-family: var(--mono); font-size: 13.5px; color: var(--ink-strong); font-weight: 600; word-break: break-all; }
  .ep-summary { color: var(--muted); font-size: 13px; margin-left: auto; text-align: right; }
  .ep-tag { font-family: var(--mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ok); border: 1px solid var(--ok); border-radius: 20px; padding: 1px 8px; flex: none; }
  .ep-body { padding: 4px 16px 16px; border-top: 1px solid var(--line-soft); }
  .ep-body .blk-sub { margin-top: 15px; }
  .ep-body .table-wrap { margin-top: 9px; }

  /* ---------- entity ---------- */
  .entity { margin-top: 14px; border: 1px solid var(--line); border-radius: 11px; background: var(--card); box-shadow: var(--shadow); overflow: hidden; }
  .ent-head { padding: 12px 15px; border-bottom: 1px solid var(--line); background: var(--panel); }
  .ent-name { font-family: var(--mono); font-size: 14.5px; font-weight: 700; color: var(--ink-strong); }
  .ent-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
  .ent-field { display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 4px 14px; align-items: baseline; padding: 9px 15px; border-bottom: 1px solid var(--line-soft); }
  .ent-field:last-child { border-bottom: 0; }
  .ent-fname { font-family: var(--mono); font-size: 13px; color: var(--ink-strong); }
  .ent-ftype { font-family: var(--mono); font-size: 12px; color: var(--info); text-align: right; }
  .ent-fnote { grid-column: 1 / -1; font-size: 12px; color: var(--muted); }
  .ent-rel { padding: 10px 15px; font-size: 12.5px; color: var(--muted); background: var(--panel-2); }
  .ent-rel b { color: var(--muted-2); font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; font-size: 11px; margin-right: 6px; }

  /* ---------- tree ---------- */
  .tree { margin-top: 16px; border: 1px solid var(--line); border-radius: 11px; background: var(--panel-2); padding: 14px 8px; box-shadow: var(--shadow); overflow-x: auto; }
  .tree-row { display: flex; align-items: baseline; gap: 10px; padding: 3px 12px; }
  .tree-name { font-family: var(--mono); font-size: 12.5px; white-space: nowrap; flex: none; }
  .tree-row.dir .tree-name { color: var(--gold); font-weight: 600; }
  .tree-row.file .tree-name { color: var(--ink); }
  .tree-note { font-size: 13px; line-height: 1.6; color: var(--muted); margin-left: auto; padding-left: 16px; text-align: right; }
  .tree-tag { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; color: var(--info); border: 1px solid var(--line); border-radius: 5px; padding: 0 5px; flex: none; }
  .tree-change { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; border: 1px solid; border-radius: 5px; padding: 0 6px; flex: none; }
  .tree-change.add { color: var(--ok); border-color: var(--ok); }
  .tree-change.del { color: var(--warn); border-color: var(--warn); }
  .tree-change.mod { color: var(--m-patch); border-color: var(--m-patch); }
  .tree-change.regen { color: var(--info); border-color: var(--info); }
  .tree-row.del .tree-name { text-decoration: line-through; color: var(--muted); }

  /* ---------- code ---------- */
  .code-title { margin-top: 18px; font-family: var(--mono); font-size: 11.5px; color: var(--muted-2); letter-spacing: .04em; }
  pre.code {
    margin: 9px 0 0; font-family: var(--mono); font-size: 12.5px; line-height: 1.6; color: #f8f8f2;
    background: #282a36; border: 1px solid #191a21; border-radius: 11px; padding: 14px 16px;
    overflow-x: auto; box-shadow: var(--shadow); white-space: pre;
  }
  pre.code.first { margin-top: 18px; }
  /* Dracula syntax tokens for JSON code blocks */
  pre.code .tok-key  { color: #8be9fd; }
  pre.code .tok-str  { color: #f1fa8c; }
  pre.code .tok-num  { color: #bd93f9; }
  pre.code .tok-lit  { color: #bd93f9; }
  pre.code .tok-punc { color: #f8f8f2; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 640px) {
    .doc { padding: 44px 18px 100px; }
    h1.doc-title { font-size: 27px; }
    .ep-summary { display: none; }
    .toc ol { columns: 1; }
  }
</style>

<button class="theme-toggle" id="themeToggle" type="button" aria-label="테마 전환"></button>
<main class="doc">
__DOC_BODY__
</main>

<script>
/* theme toggle (dark / light) — mirrors architecture-flow-map */
(function () {
  var root = document.documentElement;
  var btn = document.getElementById("themeToggle");
  var mq = window.matchMedia("(prefers-color-scheme: dark)");
  var ICON = {
    sun: '<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    moon: '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>'
  };
  var manual = false;
  function eff() { var a = root.getAttribute("data-theme"); return (a === "dark" || a === "light") ? a : (mq.matches ? "dark" : "light"); }
  function paint() { var t = eff(); btn.innerHTML = t === "dark" ? ICON.sun : ICON.moon; btn.title = (t === "dark" ? "라이트" : "다크") + " 모드로 전환"; }
  try { var s = localStorage.getItem("pfm-theme"); if (s === "dark" || s === "light") { root.setAttribute("data-theme", s); manual = true; } } catch (e) {}
  paint();
  btn.addEventListener("click", function () {
    var next = eff() === "dark" ? "light" : "dark";
    root.setAttribute("data-theme", next); manual = true;
    try { localStorage.setItem("pfm-theme", next); } catch (e) {}
    paint();
  });
  if (mq.addEventListener) mq.addEventListener("change", function () { if (!manual) paint(); });
})();

/* collapsible sections: open on anchor/TOC click + expand-all toggle */
(function () {
  var sections = Array.prototype.slice.call(document.querySelectorAll("details.section"));
  function openHash() {
    if (!location.hash) return;
    var el = document.querySelector(location.hash);
    if (el && el.tagName === "DETAILS") el.open = true;
  }
  window.addEventListener("hashchange", openHash);
  openHash();
  document.querySelectorAll(".toc a").forEach(function (a) {
    a.addEventListener("click", function () {
      var el = document.querySelector(a.getAttribute("href"));
      if (el && el.tagName === "DETAILS") el.open = true;
    });
  });
  var btn = document.getElementById("expandAll");
  if (btn) {
    var sync = function () {
      var allOpen = sections.length && sections.every(function (s) { return s.open; });
      btn.textContent = allOpen ? "모두 접기" : "모두 펼치기";
    };
    btn.addEventListener("click", function () {
      var allOpen = sections.length && sections.every(function (s) { return s.open; });
      sections.forEach(function (s) { s.open = !allOpen; });
      sync();
    });
    sections.forEach(function (s) { s.addEventListener("toggle", sync); });
    sync();
  }
})();
</script>
